<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - MetaFit</title>
    <!-- Importando o Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logoAcademia.png">
</head>
<body class="bg-gray-800 min-h-screen text-gray-800">

    <!-- Navbar -->
    <!-- ⚛️ REACT COMPONENT CANDIDATE: <Navbar /> - Pode se tornar um componente independente -->
    <nav class="bg-orange-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <img src="images/logoAcademia.png" alt="" width="100px" class="ml-3">
                    <span class="font-bold text-xl tracking-wider">Admin Alunos</span>
                    
                </div>
                <!-- Informações do Usuário (Aparece se estiver logado) -->
                <!-- ⚛️ CONDITIONAL RENDERING: No React, este elemento só seria renderizado baseando-se no estado. 
                     Exemplo: {isLoggedIn && <div id="userInfo">...</div>} ou {isLoggedIn && <UserInfo />} -->
                <div id="userInfo" class="hidden flex items-center gap-4">
                    <span id="userEmail" class="text-sm font-medium"></span>
                    <button id="btnLogout" class="bg-white text-orange-600 hover:bg-gray-100 px-4 py-2 rounded-md text-sm font-medium transition duration-200">
                        <i class="fas fa-sign-out-alt mr-2"></i>Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- SESSÃO DE LOGIN (Aparece se não estiver logado) -->
        <!-- ⚛️ CONDITIONAL RENDERING: No React, toda esta seção renderiza apenas se o usuário NÃO estiver logado: {!isLoggedIn && <LoginForm />} -->
        <!-- ⚛️ REACT COMPONENT CANDIDATE: <LoginSection /> ou <LoginForm /> -->
        <div id="loginSection" class="max-w-md mx-auto bg-slate-800 rounded-xl shadow-md overflow-hidden p-8 mt-10 border border-slate-700">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-white">Acesso Restrito</h2>
                <p class="text-sm text-slate-300 mt-2">Faça login para gerenciar os alunos</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-200">Usuário</label>
                    <input type="text" id="usuario" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-200">Senha</label>
                    <input type="password" id="password" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition duration-200">
                    Entrar
                </button>
                <div id="loginError" class="hidden text-red-500 text-sm text-center mt-2">Credenciais inválidas!</div>
            </form>
        </div>

        <!-- SESSÃO ADMINISTRATIVA / CRUD (Aparece se estiver logado) -->
        <!-- ⚛️ CONDITIONAL RENDERING: Só renderiza se estiver logado: {isLoggedIn && <AdminSection />} -->
        <!-- ⚛️ REACT COMPONENT CANDIDATE: <AdminDashboard /> ou <AdminSection /> -->
        <div id="adminSection" class="hidden space-y-8">
            
            <!-- Cards de Resumo -->
            <!-- ⚛️ REACT COMPONENT CANDIDATE: <SummaryCard title="Total de Alunos" value={totalAlunos} icon="fa-list" /> -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 ">
                <div class="bg-slate-800 rounded-xl shadow-sm p-6 border border-slate-700 flex items-center">
                    <div class="p-3 rounded-full bg-orange-100 text-orange-600 mr-4">
                        <i class="fas fa-list text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-300 font-medium">Total de Alunos</p>
                        <p id="totalAlunos" class="text-2xl font-bold text-white">0</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Formulário para Criar/Editar Alunos -->
                <!-- ⚛️ REACT COMPONENT CANDIDATE: <AlunoForm onSubmit={handleSaveAluno} /> -->
                <div class="w-full lg:w-1/3">
                    <div class="bg-slate-800 rounded-xl shadow-sm p-6 border border-slate-700 sticky top-6">
                        <h3 id="formTitle" class="text-lg font-bold text-white mb-6 border-b border-slate-700 pb-2">Novo Aluno</h3>
                        
                        <form id="alunoForm" class="space-y-4">
                            <!-- Input escondido para armazenar o ID quando estiver editando -->
                            <input type="hidden" id="alunoId">
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-200">Nome</label>
                                <input type="text" id="nome" required class="mt-1 block w-full border border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-orange-500 focus:border-orange-500 bg-slate-900 text-white">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-200">CPF</label>
                                <input type="text" id="cpf" required class="mt-1 block w-full border border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-orange-500 focus:border-orange-500 bg-slate-900 text-white">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-200">Status</label>
                                <select id="status" required class="mt-1 block w-full border border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-orange-500 focus:border-orange-500 bg-slate-900 text-white">
                                    <option value="" disabled selected>Selecione o status</option>
                                    <option value="ativo">Ativo</option>
                                    <option value="bloqueado">Bloqueado</option>
                                </select>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button type="submit" class="flex-1 bg-orange-600 text-white py-2 px-4 rounded-md shadow-sm text-sm font-medium hover:bg-orange-700 transition duration-200">
                                    Salvar
                                </button>
                                <button type="button" id="btnCancelar" class="hidden flex-1 bg-gray-200 text-gray-800 py-2 px-4 rounded-md shadow-sm text-sm font-medium hover:bg-gray-300 transition duration-200">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Lista de Alunos -->
                <!-- ⚛️ REACT COMPONENT CANDIDATE: <AlunosList alunos={alunosData} /> ou <AlunosTable /> -->
                <div class="w-full lg:w-2/3">
                    <div class="bg-slate-800 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900">
                            <h3 class="text-lg font-bold text-white">Gerenciar Alunos</h3>
                            <button onclick="carregarAlunos()" class="text-orange-300 hover:text-orange-400 text-sm font-medium">
                                <i class="fas fa-sync-alt mr-1"></i> Atualizar
                            </button>
                        </div>
                        
                        <div class="p-0">
                            <table class="min-w-full divide-y divide-slate-700">
                                <thead class="bg-slate-900">
                                    <tr>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">ID</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Nome</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">CPF</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Status</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Data de Cadastro</th>
                                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-white uppercase tracking-wider">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAlunos" class="bg-slate-900 divide-y divide-slate-700">
                                    <!-- Os dados serão injetados aqui via JavaScript -->
                                    <!-- ⚛️ RENDERIZAÇÃO DE LISTA: No React, faríamos um .map() no array de alunos para renderizar os itens: 
                                         {alunos.map(aluno => <AlunoRow key={aluno.id} data={aluno} />)} -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <footer class="text-center text-gray-500 text-sm mt-4 pb-4">
        Feito por Isa e Rebeca
    </footer>

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
